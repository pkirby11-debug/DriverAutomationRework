name: CI

# Lint and test the DriverAutomationTool module. The module targets Windows +
# PowerShell 7 (WPF GUI, SCCM/Intune), and the Pester tests dot-source files
# with Windows-style paths and use Windows-only APIs, so CI runs on windows.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Lint & Test (Windows / PowerShell 7)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PowerShell version
        shell: pwsh
        run: $PSVersionTable | Format-Table -AutoSize | Out-String | Write-Host

      - name: Install Pester & PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester          -MinimumVersion 5.5.0  -Force -Scope CurrentUser -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -MinimumVersion 1.22.0 -Force -Scope CurrentUser

      - name: Syntax (parser) check
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Path ./DriverAutomationTool -Recurse -Filter *.ps1 | ForEach-Object {
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors)
            if ($errors) {
              $failed = $true
              Write-Host "::error file=$($_.FullName)::$($errors.Count) parse error(s)"
              $errors | ForEach-Object { Write-Host "    line $($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($failed) { throw 'Parse errors found.' }
          Write-Host 'All scripts parsed cleanly.'

      - name: Validate module manifest
        shell: pwsh
        run: |
          $m = Test-ModuleManifest ./DriverAutomationTool/DriverAutomationTool.psd1
          $m | Format-List Name, Version, PowerShellVersion, CompatiblePSEditions | Out-String | Write-Host

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./DriverAutomationTool -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          if ($results) { $results | Format-Table -AutoSize | Out-String | Write-Host }
          $errors   = @($results | Where-Object Severity -eq 'Error')
          $warnings = @($results | Where-Object Severity -eq 'Warning')
          Write-Host "PSScriptAnalyzer: $($errors.Count) error(s), $($warnings.Count) warning(s)."
          # Fail the build only on Error-severity findings; warnings are reported
          # but not blocking (legacy style is cleaned up incrementally).
          if ($errors.Count -gt 0) { throw "PSScriptAnalyzer found $($errors.Count) error(s)." }

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path          = './DriverAutomationTool/Tests'
          $config.Run.Exit          = $true
          # Integration-tagged tests hit live vendor catalogs (download.lenovo.com,
          # downloads.dell.com) which a hosted runner may not reach - run them locally.
          $config.Filter.ExcludeTag = 'Integration'
          $config.Output.Verbosity  = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'testResults.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: testResults.xml
          if-no-files-found: ignore
